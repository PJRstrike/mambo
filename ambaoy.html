<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Violet</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
background:#0f172a;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.chatbox{
width:95%;
max-width:900px;
height:90vh;
background:#111827;
border-radius:15px;
display:flex;
flex-direction:column;
overflow:hidden;
}
.header{
padding:15px;
background:#1f2937;
color:#fff;
font-size:22px;
font-weight:bold;
text-align:center;
}
.chat{
flex:1;
overflow:auto;
padding:20px;
}
.msg{
margin:10px 0;
padding:12px;
border-radius:10px;
max-width:80%;
white-space:pre-wrap;
}
.user{
background:#2563eb;
color:#fff;
margin-left:auto;
}
.bot{
background:#374151;
color:#fff;
}
.bottom{
display:flex;
padding:15px;
background:#1f2937;
}
input{
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:10px;
background:#374151;
color:white;
}
button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}
button:hover{
background:#1d4ed8;
}
</style>
</head>

<body>

<div class="chatbox">

<div class="header">
Violet Mambo
</div>

<div id="chat" class="chat">
<div class="msg bot">
ehh... jangan pikir aku peduli yaa sama kamu,aku.. hanya bantu kamuu🙄
</div>
</div>

<div class="bottom">
<input id="prompt" placeholder="Tulis pertanyaan...">
<button onclick="send()">Kirim</button>
</div>

</div>

<script>

const API_KEY="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";

async function send(){

const input=document.getElementById("prompt");
const text=input.value.trim();

if(!text)return;

const chat=document.getElementById("chat");

chat.innerHTML+=`
<div class="msg user">${text}</div>
`;

input.value="";

chat.innerHTML+=`
<div class="msg bot" id="typing">
hm...
</div>
`;

chat.scrollTop=chat.scrollHeight;

try{

const res=await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"llama-3.3-70b-versatile",
messages:[
{
role:"system",
content:"Kamu adalah Violet Mambo. Jawab dalam bahasa indonesia dengan marah + tsundere + pura pura ga peduli + pakai emot lucu + jangan pakai ini *."
},
{
role:"user",
content:text
}
]
})
}
);

const data=await res.json();

document.getElementById("typing").remove();

chat.innerHTML+=`
<div class="msg bot">
${data.choices[0].message.content}
</div>
`;

}catch(err){

document.getElementById("typing").innerHTML=
"Gagal terhubung ke API.";

}

chat.scrollTop=chat.scrollHeight;

}

document.getElementById("prompt").addEventListener("keydown",e=>{
if(e.key==="Enter")send();
});

</script>

</body>
</html>
